<!doctype html><html lang="bg"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>Cycle Map Preview</title><style>:root{--ink:#211712;--orange:#ff8a3d;--sage:#86a95a;--violet:#8f6fd2}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:#fbfaf8;font-family:Manrope,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink);padding:24px}.preview-shell{width:min(430px,100%);overflow:hidden}.cycle-card{position:relative;height:540px;overflow:visible;background:transparent;border:0;box-shadow:none;isolation:isolate}.cycle-map-bg{position:absolute;inset:-30px;width:calc(100% + 60px);height:calc(100% + 60px);object-fit:cover;z-index:0;opacity:1;filter:saturate(1.02) contrast(1.03) brightness(1)}.cycle-card:after{content:"";position:absolute;inset:-42px;z-index:1;pointer-events:none;background:radial-gradient(circle at center,transparent 0%,transparent 86%,rgba(251,250,248,.24) 100%)}.cycle-top{position:absolute;top:18px;left:18px;right:18px;z-index:10;display:flex;justify-content:space-between;align-items:flex-start;gap:12px}.cycle-badge,.cycle-score{border:1px solid rgba(255,255,255,.92);background:rgba(255,255,255,.76);box-shadow:0 12px 28px rgba(80,54,35,.10);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px)}.cycle-badge{max-width:250px;padding:14px 18px;border-radius:999px;background:rgba(225,239,203,.88);color:#4e7a2c;font-size:15px;line-height:1.22;font-weight:800;letter-spacing:-.03em}.cycle-score{width:82px;height:82px;border-radius:999px;display:grid;place-items:center;color:#533630;font-size:28px;font-weight:900;letter-spacing:-.06em;flex:0 0 auto}.cycle-routes{position:absolute;inset:0;z-index:4;width:100%;height:100%;pointer-events:none}.cycle-route{fill:none;stroke-linecap:round;stroke-linejoin:round;stroke-width:8;stroke-dasharray:2 18;filter:drop-shadow(0 8px 10px rgba(80,54,35,.13));animation:cycleDash 12s linear infinite}.cycle-route.orange{stroke:var(--orange)}.cycle-route.green{stroke:var(--sage);animation-duration:10s}.cycle-route.violet{stroke:var(--violet);animation-duration:14s}@keyframes cycleDash{to{stroke-dashoffset:-200}}.pin{position:absolute;z-index:7;width:92px;height:92px;border-radius:999px;display:grid;place-items:center;transform:translate(-50%,-50%);background:rgba(255,255,255,.52);border:1px solid rgba(255,255,255,.92);box-shadow:0 24px 44px rgba(80,54,35,.14);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px)}.pin:before{content:"";width:50px;height:50px;border-radius:999px;background:var(--pin-color);box-shadow:inset 0 0 0 14px rgba(255,255,255,.94),0 12px 24px rgba(80,54,35,.12)}.pin:after{content:"";position:absolute;width:16px;height:16px;border-radius:999px;background:#fff}.pin-a{left:26%;top:25%;--pin-color:var(--orange)}.pin-b{left:76%;top:47%;--pin-color:var(--sage)}.pin-c{left:35%;top:76%;--pin-color:var(--violet)}.garden-label{position:absolute;z-index:8;transform:translate(-50%,-50%);padding:10px 16px;border-radius:999px;background:rgba(255,255,255,.9);border:1px solid rgba(255,255,255,.92);box-shadow:0 12px 24px rgba(80,54,35,.12);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);font-size:16px;font-weight:800;letter-spacing:-.04em;white-space:nowrap}.label-a{left:26%;top:13%}.label-b{left:76%;top:36%}.label-c{left:35%;top:89%}</style></head><body><main class="preview-shell"><section class="cycle-card"><img class="cycle-map-bg" src="/cycle-map-custom.png?v=5" alt=""/><div class="cycle-top"><div class="cycle-badge">● 3 страни · Потенциален цикъл</div><div class="cycle-score">72%</div></div><svg class="cycle-routes" viewBox="0 0 430 540" preserveAspectRatio="none"><path class="cycle-route orange" d="M110 140 C160 190 255 185 325 255"/><path class="cycle-route green" d="M324 258 C280 370 188 325 150 420"/><path class="cycle-route violet" d="M148 420 C64 355 62 190 108 140"/></svg><div class="garden-label label-a">Слънце</div><div class="garden-label label-b">Дъга</div><div class="garden-label label-c">Мечо Пух</div><div class="pin pin-a"></div><div class="pin pin-b"></div><div class="pin pin-c"></div></section></main></body></html>
